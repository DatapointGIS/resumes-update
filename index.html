let state={jobs:[],applicants:{},selectedJobId:null,sortBy:'default',searchQuery:''};

async function loadState(){
  try{
    const r=await window.storage.get('hiring_v2');
    if(r&&r.value){const d=JSON.parse(r.value);state.jobs=d.jobs||[];state.applicants=d.applicants||{};}
    else{state.jobs=JSON.parse(JSON.stringify(SEED_JOBS));state.applicants=JSON.parse(JSON.stringify(SEED_APPLICANTS));await saveState(true);}
  }catch(e){state.jobs=JSON.parse(JSON.stringify(SEED_JOBS));state.applicants=JSON.parse(JSON.stringify(SEED_APPLICANTS));}
  render();
}
async function saveState(silent){
  try{await window.storage.set('hiring_v2',JSON.stringify({jobs:state.jobs,applicants:state.applicants}));if(!silent)toast('Saved');}
  catch(e){toast('Save failed',true);}
}
function toast(msg,err){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:${err?'#FCEBEB':'var(--color-text-primary)'};color:${err?'#A32D2D':'var(--color-background-primary)'};padding:8px 16px;border-radius:var(--border-radius-md);font-size:13px;z-index:999;`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function render(){renderStats();state.selectedJobId?renderJobDetail(state.selectedJobId):renderJobList();}
function renderStats(){
  const total=state.jobs.length;
  const open=state.jobs.filter(j=>j.status==='Open').length;
  const totalApps=Object.values(state.applicants).reduce((s,a)=>s+a.filter(x=>x.status!=='Removed').length,0);
  document.getElementById('stat-bar').innerHTML=`
    <div class="stat-card stat-blue"><div class="num">${total}</div><div class="lbl">Positions</div></div>
    <div class="stat-card stat-green"><div class="num">${open}</div><div class="lbl">Open</div></div>
    <div class="stat-card stat-purple"><div class="num">${totalApps}</div><div class="lbl">Active applicants</div></div>`;
}
function getSortedJobs(){
  const jobs=[...state.jobs];
  if(state.sortBy==='alpha')jobs.sort((a,b)=>a.title.localeCompare(b.title));
  else if(state.sortBy==='dept')jobs.sort((a,b)=>(a.department||'').localeCompare(b.department||'')||a.title.localeCompare(b.title));
  else if(state.sortBy==='location')jobs.sort((a,b)=>(a.location||'').localeCompare(b.location||'')||a.title.localeCompare(b.title));
  return jobs;
}

function clickStage(appId,newStage){
  if(newStage==='Removed'){markRemoved(appId);return;}
  const nameVal=prompt(`Who is making this change? (Your name will be logged with the stage change to "${newStage}")`);
  if(nameVal===null)return;
  const changer=nameVal.trim()||'Unknown';
  let app=null;
  for(const arr of Object.values(state.applicants)){const a=arr.find(x=>x.id==appId);if(a){app=a;break;}}
  if(!app)return;
  const prev=app.status;
  app.status=newStage;
  if(!app.change_log)app.change_log=[];
  app.change_log.push(`${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} — ${changer} changed from ${prev} → ${newStage}`);
  saveState();
  closeModal();
  openCandidate(appId);
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.jobs||!d.applicants)throw new Error('Invalid format');
      if(confirm(`Import ${d.jobs.length} positions and their applicants? This will replace all current data.`)){
        state.jobs=d.jobs.map(j=>({...j,openings:j.openings||1,posting_name:j.posting_name||'',posting_file:j.posting_file||null}));
        state.applicants={};
        for(const[k,arr]of Object.entries(d.applicants)){state.applicants[k]=arr.map(a=>({...a,source:a.source||'',change_log:a.change_log||[]}));}
        state.selectedJobId=null;saveState();render();toast('Imported successfully');
      }
    }catch(err){toast('Import failed: invalid JSON file',true);}
  };r.readAsText(file);
  input.value='';

    <div class="overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
        <h3>${title}</h3>${body}
        <div class="modal-footer">
          <div style="display:flex;gap:6px;">${left}<button class="btn btn-sm" onclick="closeModal()">Cancel</button></div>
          <div style="display:flex;gap:6px;">${right}</div>
        </div>
      </div>
    </div>`;
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modal-root').innerHTML='';}
loadState();
</script>
