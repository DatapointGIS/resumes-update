let state = { jobs: [], applicants: {}, selectedJobId: null, searchQuery: '' };

async function loadState() {
  try {
    const r = await window.storage.get('hiring_data');
    if (r && r.value) {
      const d = JSON.parse(r.value);
      state.jobs = d.jobs || [];
      state.applicants = d.applicants || {};
    } else {
      state.jobs = SEED.jobs;
      state.applicants = SEED.applicants;
      await saveState(true);
    }
  } catch(e) {
    state.jobs = SEED.jobs;
    state.applicants = SEED.applicants;
  }
  render();
}

async function saveState(silent) {
  try {
    await window.storage.set('hiring_data', JSON.stringify({jobs: state.jobs, applicants: state.applicants}));
    if (!silent) showToast('Saved');
  } catch(e) { showToast('Save failed', true); }
}

function showToast(msg, err) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:20px;right:20px;background:${err?'var(--color-background-danger)':'var(--color-text-primary)'};color:${err?'var(--color-text-danger)':'var(--color-background-primary)'};padding:8px 16px;border-radius:var(--border-radius-md);font-size:13px;z-index:999;`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2000);
}

function render() {
  renderSidebar();
  if (state.selectedJobId) renderJob(state.selectedJobId);
}

function renderSidebar() {
  const el = document.getElementById('jobs-list');
  el.innerHTML = state.jobs.map(j => {
    const count = (state.applicants[j.id] || []).length;
    const active = state.selectedJobId == j.id ? ' active' : '';
    return `<div class="job-item${active}" onclick="selectJob(${j.id})">
      <div class="job-title">${j.title}</div>
      <div class="job-meta">
        <span class="${dotClass(j.status)}"></span>
        <span>${j.department}</span>
        <span>·</span>
        <span>${j.location}</span>
        ${count > 0 ? `<span>· ${count} applicant${count!==1?'s':''}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function selectJob(id) {
  state.selectedJobId = id;
  state.searchQuery = '';
  renderSidebar();
  renderJob(id);
}

function renderJob(id) {
  const job = state.jobs.find(j=>j.id==id);
  if (!job) return;
  const applicants = state.applicants[id] || [];
  const q = state.searchQuery.toLowerCase();
  const filtered = q ? applicants.filter(a=>a.name.toLowerCase().includes(q)||a.email.toLowerCase().includes(q)||(a.notes||'').toLowerCase().includes(q)) : applicants;
  
  const grouped = {};
  STAGES.forEach(s=>grouped[s]=[]);
  filtered.forEach(a=>{ const s = STAGES.includes(a.status)?a.status:'New'; grouped[s].push(a); });

  const stageHTML = STAGES.map(stage => {
    const list = grouped[stage];
    if (!list.length) return '';
    return `<div class="stage-section">
      <div class="stage-label">${stage} <em class="stage-count">${list.length}</em></div>
      ${list.map(a => `<div class="applicant-card" onclick="openCandidate(${a.id})">
        <div class="applicant-card-row">
          <div>
            <div class="applicant-name">${a.name}</div>
            <div class="applicant-sub">${[a.phone||'', a.applied_date ? 'Applied '+a.applied_date : ''].filter(Boolean).join(' · ')}</div>
          </div>
          <div class="applicant-actions" onclick="event.stopPropagation()">
            ${a.resume_file ? `<a href="${a.resume_file}" target="_blank" title="View resume" style="color:var(--color-text-secondary);font-size:16px;"><i class="ti ti-file-text" aria-hidden="true"></i></a>` : ''}
            <select class="select-stage" onchange="changeStage(${a.id},this.value)">
              ${STAGES.map(s=>`<option${s===a.status?' selected':''}>${s}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="job-header">
      <div class="job-header-left">
        <h2>${job.title}</h2>
        <div class="meta">
          <span>${job.department}</span>
          <span>·</span>
          <span>${job.location}</span>
          <span>·</span>
          ${jobBadge(job.status)}
          <span>· ${applicants.length} applicant${applicants.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="job-header-right">
        <select class="select-status" onchange="changeJobStatus(${job.id},this.value)">
          ${JOB_STATUSES.map(s=>`<option${s===job.status?' selected':''}>${s}</option>`).join('')}
        </select>
        <button class="btn" onclick="openEditJob(${job.id})"><i class="ti ti-edit" aria-hidden="true"></i> Edit</button>
        <button class="btn btn-primary" onclick="openNewCandidate(${job.id})"><i class="ti ti-user-plus" aria-hidden="true"></i> Add candidate</button>
      </div>
    </div>
    ${job.description ? `<div class="desc-box">${job.description}</div>` : ''}
    <div class="pipeline-header">
      <h3>Candidates</h3>
      <input class="search-box" type="text" placeholder="Search candidates…" value="${state.searchQuery}" oninput="searchCandidates(this.value)">
    </div>
    ${stageHTML || '<p style="color:var(--color-text-secondary);font-size:13px;padding:20px 0;">No candidates yet.</p>'}
  `;
}

function searchCandidates(q) {
  state.searchQuery = q;
  renderJob(state.selectedJobId);
}

function changeJobStatus(id, val) {
  const j = state.jobs.find(j=>j.id==id);
  if (j) { j.status = val; saveState(); renderSidebar(); renderJob(id); }
}

function changeStage(appId, val) {
  for (const arr of Object.values(state.applicants)) {
    const a = arr.find(x=>x.id==appId);
    if (a) { a.status = val; saveState(); renderJob(state.selectedJobId); return; }
  }
}

function openCandidate(appId) {
  let applicant = null;
  for (const arr of Object.values(state.applicants)) {
    const a = arr.find(x=>x.id==appId);
    if (a) { applicant = a; break; }
  }
  if (!applicant) return;

  const init = initials(applicant.name);
  showModal(`
    <div class="candidate-detail">
      <div class="detail-header">
        <div class="avatar">${init}</div>
        <div>
          <div style="font-size:17px;font-weight:500;">${applicant.name}</div>
          <div style="font-size:13px;color:var(--color-text-secondary);margin-top:2px;">Applied ${applicant.applied_date||'—'} · ${stageBadge(applicant.status)}</div>
        </div>
      </div>
      <div class="detail-contact">
        ${applicant.phone ? `<div class="contact-item"><i class="ti ti-phone" aria-hidden="true" style="font-size:15px;"></i> ${applicant.phone}</div>` : ''}
        ${applicant.email && applicant.email!='N/A' ? `<div class="contact-item"><i class="ti ti-mail" aria-hidden="true" style="font-size:15px;"></i> <a href="mailto:${applicant.email}">${applicant.email}</a></div>` : ''}
        ${applicant.linked_in && !['','Indeed','Careers','Personal entry'].includes(applicant.linked_in) ? `<div class="contact-item"><i class="ti ti-brand-linkedin" aria-hidden="true" style="font-size:15px;"></i> <a href="${applicant.linked_in}" target="_blank">LinkedIn</a></div>` : ''}
        ${applicant.linked_in && ['Indeed','Careers','Personal entry'].includes(applicant.linked_in) ? `<div class="contact-item"><i class="ti ti-link" aria-hidden="true" style="font-size:15px;"></i> ${applicant.linked_in}</div>` : ''}
      </div>
      ${applicant.resume_file
        ? `<div class="resume-attached"><i class="ti ti-file-text" aria-hidden="true" style="font-size:18px;color:var(--color-text-secondary);"></i><a href="${applicant.resume_file}" target="_blank">${applicant.resume_name||'View resume'}</a><button class="btn btn-danger" style="padding:4px 8px;font-size:12px;" onclick="removeResume(${applicant.id})"><i class="ti ti-x" aria-hidden="true"></i></button></div>`
        : `<div class="resume-zone" onclick="triggerResumeUpload(${applicant.id})"><i class="ti ti-upload" aria-hidden="true" style="font-size:20px;display:block;margin-bottom:6px;"></i>Click to attach resume (PDF, DOC, PNG)</div>`
      }
      <input type="file" id="file-input-${applicant.id}" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg" onchange="handleResumeUpload(${applicant.id}, this)">
      <div class="form-group">
        <label>Pipeline stage</label>
        <select onchange="changeStage(${applicant.id},this.value)" style="width:100%">
          ${STAGES.map(s=>`<option${s===applicant.status?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea rows="4" id="notes-${applicant.id}" style="width:100%">${applicant.notes||''}</textarea>
      </div>
    </div>
  `, 'Candidate detail', [
    {label:'Save notes', primary:true, action:`saveNotes(${applicant.id})`},
    {label:'Delete', danger:true, action:`deleteCandidate(${applicant.id})`}
  ]);
}

function triggerResumeUpload(id) {
  document.getElementById('file-input-'+id)?.click();
}

function handleResumeUpload(appId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    for (const arr of Object.values(state.applicants)) {
      const a = arr.find(x=>x.id==appId);
      if (a) {
        a.resume_name = file.name;
        a.resume_file = e.target.result;
        saveState();
        closeModal();
        openCandidate(appId);
        return;
      }
    }
  };
  reader.readAsDataURL(file);
}

function removeResume(appId) {
  for (const arr of Object.values(state.applicants)) {
    const a = arr.find(x=>x.id==appId);
    if (a) { a.resume_name=''; a.resume_file=null; saveState(); closeModal(); openCandidate(appId); return; }
  }
}

function saveNotes(appId) {
  const val = document.getElementById('notes-'+appId)?.value;
  for (const arr of Object.values(state.applicants)) {
    const a = arr.find(x=>x.id==appId);
    if (a) { a.notes = val; saveState(); closeModal(); renderJob(state.selectedJobId); return; }
  }
}

function deleteCandidate(appId) {
  if (!confirm('Remove this candidate?')) return;
  for (const [key, arr] of Object.entries(state.applicants)) {
    const idx = arr.findIndex(x=>x.id==appId);
    if (idx>=0) { arr.splice(idx,1); saveState(); closeModal(); renderJob(state.selectedJobId); renderSidebar(); return; }
  }
}

function openNewCandidate(jobId) {
  showModal(`
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Full name *</label><input type="text" id="nc-name" placeholder="Jane Smith"></div><div class="form-group" style="margin-bottom:0"><label>Phone</label><input type="text" id="nc-phone" placeholder="210-555-0100"></div></div>
    <div class="form-group"><label>Email</label><input type="email" id="nc-email" placeholder="jane@example.com"></div>
    <div class="form-group"><label>Applied date</label><input type="date" id="nc-date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-group"><label>Pipeline stage</label><select id="nc-stage">${STAGES.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label>Notes</label><textarea rows="3" id="nc-notes"></textarea></div>
  `, 'Add candidate', [{label:'Add candidate', primary:true, action:`submitNewCandidate(${jobId})`}]);
}

function submitNewCandidate(jobId) {
  const name = document.getElementById('nc-name')?.value?.trim();
  if (!name) { alert('Name is required'); return; }
  const a = {
    id: Date.now(), job_id: jobId,
    name, phone: document.getElementById('nc-phone')?.value||'',
    email: document.getElementById('nc-email')?.value||'',
    applied_date: document.getElementById('nc-date')?.value||'',
    status: document.getElementById('nc-stage')?.value||'New',
    notes: document.getElementById('nc-notes')?.value||'',
    resume_name:'', resume_file:null, linked_in:'', cover_letter:''
  };
  if (!state.applicants[jobId]) state.applicants[jobId] = [];
  state.applicants[jobId].unshift(a);
  saveState();
  closeModal();
  renderJob(jobId);
  renderSidebar();
}

function openNewJob() {
  showModal(`
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Job title *</label><input type="text" id="nj-title" placeholder="Survey Technician"></div><div class="form-group" style="margin-bottom:0"><label>Department</label><input type="text" id="nj-dept" placeholder="Civil Survey"></div></div>
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Location</label><input type="text" id="nj-loc" placeholder="San Antonio"></div><div class="form-group" style="margin-bottom:0"><label>Status</label><select id="nj-status">${JOB_STATUSES.map(s=>`<option>${s}</option>`).join('')}</select></div></div>
    <div class="form-group"><label>Description / requirements</label><textarea rows="4" id="nj-desc"></textarea></div>
  `, 'New job posting', [{label:'Create posting', primary:true, action:'submitNewJob()'}]);
}

function submitNewJob() {
  const title = document.getElementById('nj-title')?.value?.trim();
  if (!title) { alert('Title is required'); return; }
  const j = {
    id: Date.now(), title,
    department: document.getElementById('nj-dept')?.value||'',
    location: document.getElementById('nj-loc')?.value||'',
    status: document.getElementById('nj-status')?.value||'Open',
    description: document.getElementById('nj-desc')?.value||''
  };
  state.jobs.unshift(j);
  saveState();
  closeModal();
  selectJob(j.id);
}

function openEditJob(id) {
  const j = state.jobs.find(x=>x.id==id);
  if (!j) return;
  showModal(`
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Job title *</label><input type="text" id="ej-title" value="${j.title}"></div><div class="form-group" style="margin-bottom:0"><label>Department</label><input type="text" id="ej-dept" value="${j.department||''}"></div></div>
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Location</label><input type="text" id="ej-loc" value="${j.location||''}"></div><div class="form-group" style="margin-bottom:0"><label>Status</label><select id="ej-status">${JOB_STATUSES.map(s=>`<option${s===j.status?' selected':''}>${s}</option>`).join('')}</select></div></div>
    <div class="form-group"><label>Description / requirements</label><textarea rows="4" id="ej-desc">${j.description||''}</textarea></div>
  `, 'Edit job posting', [
    {label:'Save changes', primary:true, action:`submitEditJob(${id})`},
    {label:'Delete posting', danger:true, action:`deleteJob(${id})`}
  ]);
}

function submitEditJob(id) {
  const j = state.jobs.find(x=>x.id==id);
  if (!j) return;
  j.title = document.getElementById('ej-title')?.value?.trim()||j.title;
  j.department = document.getElementById('ej-dept')?.value||'';
  j.location = document.getElementById('ej-loc')?.value||'';
  j.status = document.getElementById('ej-status')?.value||j.status;
  j.description = document.getElementById('ej-desc')?.value||'';
  saveState();
  closeModal();
  renderSidebar();
  renderJob(id);
}

function deleteJob(id) {
  if (!confirm('Delete this job posting and all its candidates?')) return;
  state.jobs = state.jobs.filter(j=>j.id!=id);
  delete state.applicants[id];
  state.selectedJobId = null;
  saveState();
  closeModal();
  renderSidebar();
  document.getElementById('main-content').innerHTML = `<div class="empty-state"><i class="ti ti-briefcase" aria-hidden="true"></i><p>Select a job to view candidates</p></div>`;
}

function showModal(body, title, buttons=[]) {
  const btns = buttons.map(b=>
    b.danger ? `<button class="btn btn-danger" onclick="${b.action}">${b.label}</button>`
    : b.primary ? `<button class="btn btn-primary" onclick="${b.action}">${b.label}</button>`
    : `<button class="btn" onclick="${b.action}">${b.label}</button>`
  ).join('');
  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
        <h3>${title}</h3>
        ${body}
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          ${btns}
        </div>
      </div>
    </div>`;
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-root').innerHTML = '';
}

loadState();
</script>
